services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unishopnex-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql

  nginx:
    image: nginx:1.27-alpine
    container_name: unishopnex-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: unishopnex-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: unishopnex
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: unishopnex
      MYSQL_PASSWORD: secret
    ports:
      - "33060:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro

volumes:
  mysql-data:
